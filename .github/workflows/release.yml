name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    # 22d: plain Maven build (Eclipse bundles from Maven Central; no Tycho, no p2).
    - name: Build
      run: mvn -B -f build/pom.xml install -DskipTests

    - name: Test (in-framework)
      run: |
        java -Djawata.test.fixtures="$PWD/org.jawata.core.tests/test-resources/sample-projects" \
             -Djawata.experience.shared.dir="$RUNNER_TEMP/jawata-test-store" \
             -jar build/dist/target/dist/jawata.jar -runTests
        test $? -eq 0

    # ONE universal dist (every platform's SWT fragment ships; Equinox resolves the
    # matching one at boot). The five per-consumer asset names are kept for full
    # compatibility with install.sh and jawata-studio's release manager — identical
    # content under each name.
    - name: Package distributions
      run: |
        set -e
        TAG=${{ github.ref_name }}
        OUT="$GITHUB_WORKSPACE/build/dist/target"
        cd "$OUT" && cp -r dist "jawata-$TAG"
        tar -czf "jawata-$TAG-linux-x64.tar.gz"   "jawata-$TAG"
        cp jawata-$TAG-linux-x64.tar.gz "jawata-$TAG-linux-arm64.tar.gz"
        zip -rq "jawata-$TAG-win32-x64.zip"  "jawata-$TAG"
        cp jawata-$TAG-win32-x64.zip "jawata-$TAG-macos-x64.zip"
        cp jawata-$TAG-win32-x64.zip "jawata-$TAG-macos-arm64.zip"
        rm -rf "jawata-$TAG"
        echo "=== packaged artifacts ===" && ls -la jawata-"$TAG"-*

    - name: Pick release body
      id: notes
      run: |
        notes_file="docs/release-notes/${{ github.ref_name }}.md"
        if [ -f "$notes_file" ]; then
          echo "body_path=$notes_file" >> "$GITHUB_OUTPUT"
        else
          echo "body_path=" >> "$GITHUB_OUTPUT"
        fi

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          build/dist/target/jawata-${{ github.ref_name }}-*.tar.gz
          build/dist/target/jawata-${{ github.ref_name }}-*.zip
        body_path: ${{ steps.notes.outputs.body_path }}
        generate_release_notes: ${{ steps.notes.outputs.body_path == '' }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    # NOTE: npm-publish and MCP-Registry-publish steps are intentionally
    # omitted. jawata-studio downloads the jar archives directly from the
    # GitHub Release attached above, which is all the runtime path needs.
