name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Build and Test
      run: ./mvnw clean verify

    - name: Package per-platform distributions
      run: |
        set -e
        TAG=${{ github.ref_name }}
        OUT="$GITHUB_WORKSPACE/org.goja.product/target/products"
        P="$OUT/org.goja.product"
        # Linux + Windows: the product dir is named "goja"; rename to goja-<tag> then archive.
        pkg_dir() {   # $1=platform-path  $2=suffix  $3=tar|zip
          local d="$P/$1"
          [ -d "$d/goja" ] || { echo "skip $1 (no goja/ — platform not built)"; return 0; }
          ( cd "$d" && cp -r goja "goja-$TAG"
            case "$3" in
              tar) tar -czf "$OUT/goja-$TAG-$2.tar.gz" "goja-$TAG" ;;
              zip) zip -rq  "$OUT/goja-$TAG-$2.zip"    "goja-$TAG" ;;
            esac
            rm -rf "goja-$TAG" )
        }
        # macOS: the product IS the Goja.app bundle; zip it as-is (keeps the .app).
        pkg_app() {   # $1=platform-path  $2=suffix
          local d="$P/$1"
          [ -d "$d/Goja.app" ] || { echo "skip $1 (no Goja.app)"; return 0; }
          ( cd "$d" && zip -rq "$OUT/goja-$TAG-$2.zip" "Goja.app" )
        }
        pkg_dir linux/gtk/x86_64    linux-x64    tar
        pkg_dir linux/gtk/aarch64   linux-arm64  tar
        pkg_dir win32/win32/x86_64  win32-x64    zip
        pkg_app macosx/cocoa/x86_64   macos-x64
        pkg_app macosx/cocoa/aarch64  macos-arm64
        echo "=== packaged artifacts ===" && ls -la "$OUT"/goja-"$TAG"-* || true

    - name: Pick release body
      id: notes
      run: |
        notes_file="docs/release-notes/${{ github.ref_name }}.md"
        if [ -f "$notes_file" ]; then
          echo "body_path=$notes_file" >> "$GITHUB_OUTPUT"
        else
          echo "body_path=" >> "$GITHUB_OUTPUT"
        fi

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          org.goja.product/target/products/goja-${{ github.ref_name }}-*.tar.gz
          org.goja.product/target/products/goja-${{ github.ref_name }}-*.zip
        body_path: ${{ steps.notes.outputs.body_path }}
        generate_release_notes: ${{ steps.notes.outputs.body_path == '' }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    # NOTE: npm-publish and MCP-Registry-publish steps are intentionally
    # omitted. goja-studio downloads the jar archives directly from the
    # GitHub Release attached above, which is all the runtime path needs.
    # (A goja npm package / registry entry can be added later if desired.)
