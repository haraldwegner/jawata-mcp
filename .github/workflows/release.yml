name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: p2 preflight — fall back to the FAU mirror if the Eclipse primary is down
      run: |
        if curl -sf --max-time 20 -o /dev/null https://download.eclipse.org/releases/2025-12/p2.index; then
          echo "Eclipse primary healthy — canonical p2.base"
        else
          echo "P2_BASE_FLAG=-Dp2.base=https://ftp.fau.de/eclipse" >> "$GITHUB_ENV"
          echo "::warning::download.eclipse.org unavailable — building against the FAU mirror"
        fi

    - name: Build and Test
      run: ./mvnw clean verify $P2_BASE_FLAG

    - name: Package per-platform distributions
      run: |
        set -e
        TAG=${{ github.ref_name }}
        OUT="$GITHUB_WORKSPACE/org.jawata.product/target/products"
        P="$OUT/org.jawata.product"
        # Linux + Windows: the product dir is named "jawata"; rename to jawata-<tag> then archive.
        pkg_dir() {   # $1=platform-path  $2=suffix  $3=tar|zip
          local d="$P/$1"
          [ -d "$d/jawata" ] || { echo "skip $1 (no jawata/ — platform not built)"; return 0; }
          ( cd "$d" && cp -r jawata "jawata-$TAG"
            case "$3" in
              tar) tar -czf "$OUT/jawata-$TAG-$2.tar.gz" "jawata-$TAG" ;;
              zip) zip -rq  "$OUT/jawata-$TAG-$2.zip"    "jawata-$TAG" ;;
            esac
            rm -rf "jawata-$TAG" )
        }
        # macOS: the product IS the Jawata.app bundle; zip it as-is (keeps the .app).
        pkg_app() {   # $1=platform-path  $2=suffix
          local d="$P/$1"
          [ -d "$d/Jawata.app" ] || { echo "skip $1 (no Jawata.app)"; return 0; }
          ( cd "$d" && zip -rq "$OUT/jawata-$TAG-$2.zip" "Jawata.app" )
        }
        pkg_dir linux/gtk/x86_64    linux-x64    tar
        pkg_dir linux/gtk/aarch64   linux-arm64  tar
        pkg_dir win32/win32/x86_64  win32-x64    zip
        pkg_app macosx/cocoa/x86_64   macos-x64
        pkg_app macosx/cocoa/aarch64  macos-arm64
        echo "=== packaged artifacts ===" && ls -la "$OUT"/jawata-"$TAG"-* || true

    - name: Pick release body
      id: notes
      run: |
        notes_file="docs/release-notes/${{ github.ref_name }}.md"
        if [ -f "$notes_file" ]; then
          echo "body_path=$notes_file" >> "$GITHUB_OUTPUT"
        else
          echo "body_path=" >> "$GITHUB_OUTPUT"
        fi

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          org.jawata.product/target/products/jawata-${{ github.ref_name }}-*.tar.gz
          org.jawata.product/target/products/jawata-${{ github.ref_name }}-*.zip
        body_path: ${{ steps.notes.outputs.body_path }}
        generate_release_notes: ${{ steps.notes.outputs.body_path == '' }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    # NOTE: npm-publish and MCP-Registry-publish steps are intentionally
    # omitted. jawata-studio downloads the jar archives directly from the
    # GitHub Release attached above, which is all the runtime path needs.
    # (A jawata npm package / registry entry can be added later if desired.)
