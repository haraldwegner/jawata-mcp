name: CI

on:
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
      fail-fast: false

    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    # 22d: plain Maven build (Eclipse bundles from Maven Central; no Tycho, no p2).
    - name: Build
      shell: bash
      run: mvn -B -f build/pom.xml install -DskipTests

    # The full suite runs in-framework (the tycho-surefire replacement): the boot
    # module starts Equinox, installs the test fragments, runs JUnit inside.
    # Exit code = failed-test count.
    - name: Test (in-framework)
      shell: bash
      run: |
        java -Djawata.test.fixtures="$PWD/org.jawata.core.tests/test-resources/sample-projects" \
             -Djawata.experience.shared.dir="$RUNNER_TEMP/jawata-test-store" \
             -jar build/dist/target/dist/jawata.jar -runTests | tee test-run.log
        test ${PIPESTATUS[0]} -eq 0

    - name: Upload test log
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-log-${{ matrix.os }}
        path: test-run.log
