name: CI

on:
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
      fail-fast: false

    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: p2 preflight — fall back to the FAU mirror if the Eclipse primary is down
      shell: bash
      run: |
        if curl -sf --max-time 20 -o /dev/null https://download.eclipse.org/releases/2026-06/p2.index; then
          echo "Eclipse primary healthy — canonical p2.base"
        else
          echo "P2_BASE_FLAG=-Dp2.base=https://ftp.fau.de/eclipse" >> "$GITHUB_ENV"
          echo "::warning::download.eclipse.org unavailable — building against the FAU mirror"
        fi

    - name: Build and Test
      shell: bash
      run: ./mvnw clean verify $P2_BASE_FLAG

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results-${{ matrix.os }}
        path: |
          **/target/surefire-reports/
          **/target/failsafe-reports/
